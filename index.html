<!doctype html>
<html lang="es" class="scroll-smooth">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO básico -->
    <title>Juan Sebastian Lozada Ceballos | Desarrollador de Software</title>
    <meta
      name="description"
      content="Portafolio de Juan Sebastian Lozada Ceballos, desarrollador full-stack. Proyectos, habilidades y formación en análisis y desarrollo de software."
    />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Juan Sebastian Lozada Ceballos | Desarrollador de Software" />
    <meta
      property="og:description"
      content="Portafolio de un desarrollador full-stack: proyectos, habilidades y formación."
    />

    <!-- Evita el parpadeo (FOUC) aplicando el tema antes de pintar -->
    <script>
      (function () {
        try {
          // Modo oscuro por defecto; solo se desactiva si el usuario eligió claro.
          const stored = localStorage.getItem('theme')
          if (stored !== 'light') {
            document.documentElement.classList.add('dark')
          }
        } catch (_) {
          document.documentElement.classList.add('dark')
        }
      })()
    </script>

    <!-- Tipografías -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Poppins:wght@500;600;700;800&display=swap"
      rel="stylesheet"
    />

  </body>
